workspace:
  name: giant

# Local cache lives at the workspace root so it's easy to inspect /
# clear. ~/.cache/giant is fine for personal use; we override to
# keep CI / contributor environments self-contained.
cache:
  dir: .giant/cache

# Sandbox extras for this repo's Nix/devenv toolchain (only consulted under
# `giant --sandbox` / `giant verify`). Core grants the generic FHS roots and a
# generic env allowlist; these add what a devenv environment needs - the Nix
# store and its env families - so sandboxed builds resolve their tools here. A
# non-Nix project would not need this block; giant assumes no toolchain manager.
sandbox:
  roots:
    - "/nix/store"
    - "/run/current-system/sw"
  env:
    - "NIX_*"
    - "DEVENV_*"
    - "LOCALE_ARCHIVE"

# -----------------------------------------------------------------------------
# Per-package config (the multi-file model). Each package's targets live
# in its own directory's giant.yaml; the engine scans and merges them:
#
#   crates/giant/giant.yaml       → //crates/giant:giant       (the engine)
#   crates/giant-task/giant.yaml  → //crates/giant-task:giant-task
#   crates/giant-tui/giant.yaml   → //crates/giant-tui:giant-tui
#   docs-site/giant.yaml          → //docs-site:install, //docs-site:build
#
# This root file keeps the workspace-global settings, the toolchain target
# (its inputs are root files), and the tasks.
#
# Toolchain pinning: `//:devenv` emits the realized devenv profile store
# path as its identity. Every build target depends on it, so a toolchain
# change re-keys them and stale artifacts are never reused across machines
# or upgrades. The profile is the whole dev environment (coarse: bumping
# any tool rebuilds everything) but it never misses an input - the right
# default for a correctness check. Cargo.lock stays in each target's
# inputs: it pins dependencies, a separate axis from the toolchain.
# -----------------------------------------------------------------------------
targets:
  - name: "devenv"
    inputs:
      - "devenv.lock"
      - "devenv.nix"
    outputs: [".giant/toolchains/devenv.id"]
    command: "readlink -f .devenv/profile > .giant/toolchains/devenv.id"
    tags: ["toolchain"]
    # Reads the realized `.devenv/profile` (generated env state, not a declared
    # source input), so it can't be hermetic - exempt it from `--sandbox` /
    # `giant verify`. Its soundness is the declared lock/nix inputs, not the
    # sandbox. (A toolchain identity probe is never a hermetic build.)
    sandbox: false

# -----------------------------------------------------------------------------
# Tasks - named commands. Most are `cargo X` wrappers; the docs pipeline
# strings together the install + build via `deps:`.
#
# Why have these at all when `cargo X` is right there? Two reasons:
# 1. `giant task list` is one place to see everything you can do.
# 2. `check` ties together fmt-check + clippy + test in one invocation,
#    which is what CI runs and what you want before a tag.
# -----------------------------------------------------------------------------
tasks:
  fmt:
    command: "cargo fmt --all"
    description: "format all Rust code"

  fmt-check:
    command: "cargo fmt --all -- --check"
    description: "fail if anything would be reformatted"

  lint:
    command: "cargo clippy --workspace --all-targets -- -D warnings"
    description: "clippy with warnings-as-errors"

  test-all:
    command: "cargo test --workspace"
    description: "the full workspace test suite (core + giant-task)"

  perf:
    command: "cargo test --release --test perf -- --ignored --nocapture"
    description: "run the perf benchmarks against CLAUDE.md budgets"

  check:
    command: "echo all checks passed"
    description: "validation pipeline - runs before a release"
    needs: ["fmt-check", "lint", "test-all"]

  release-build:
    command: "cargo build --release --workspace"
    description: "release-mode build of giant + giant-task"

  release:
    command: "echo ready to tag"
    description: "everything green for a release tag"
    needs: ["check", "release-build", "docs"]

  bin:
    command: "echo refreshed ./bin with the giant suite"
    description: "build every binary and install it into ./bin"
    deps:
      - "//crates/giant:giant"
      - "//crates/giant-task:giant-task"
      - "//crates/giant-tui:giant-tui"
      - "//crates/giant-gen:giant-gen"
      - "//crates/giant-graph:giant-graph"
      - "//crates/giant-sandbox:giant-sandbox"

  docs:
    command: "echo docs built to docs-site/dist/"
    description: "build the static docs site"
    deps: ["//docs-site:build"]

  docs-dev:
    # No declared args, so everything is forwarded to astro via `$@`:
    # `giant task docs-dev --host` (or `... -- --host`) binds all interfaces.
    command: 'npx astro dev "$@"'
    description: "serve the docs site at localhost:4321 (blocks)"
    deps: ["//docs-site:install"]
    cwd: "docs-site"

  docs-preview:
    command: 'npx astro preview "$@"'
    description: "preview the production-built docs site"
    deps: ["//docs-site:build"]
    cwd: "docs-site"
