name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BINS: >-
    giant giant-build giant-test giant-verify giant-task giant-tui
    giant-gen giant-sandbox giant-graph giant-affected giant-clean
    giant-logs giant-explain

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - triple: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - triple: x86_64-apple-darwin
            runner: macos-15
          - triple: aarch64-apple-darwin
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches the workspace version
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match workspace version $version" >&2
            exit 1
          fi

      - name: Install musl toolchain
        if: contains(matrix.triple, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust target
        run: |
          rustup update --no-self-update stable
          rustup target add ${{ matrix.triple }}

      - name: Build
        run: >-
          cargo build --release --locked --workspace
          --features giant/remote --target ${{ matrix.triple }}

      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          tarball="giant-${version}-${{ matrix.triple }}.tar.gz"
          mkdir stage
          for b in $BINS; do
            cp "target/${{ matrix.triple }}/release/$b" stage/
          done
          cp LICENSE NOTICE stage/
          (cd stage && tar -czf "../$tarball" -- *)

      - uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.triple }}
          path: giant-*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum giant-*.tar.gz > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --title "$GITHUB_REF_NAME"
          --generate-notes
          --verify-tag
          giant-*.tar.gz SHA256SUMS
