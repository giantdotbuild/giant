name: Release

# Giant builds the release: each platform job installs the previous giant
# release and runs the repo's `release-<triple>` target, sharing results
# through the github_actions remote cache - a re-release of unchanged
# sources restores binaries instead of compiling them. `workflow_dispatch`
# runs the builds without publishing, for validating the pipeline.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - triple: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - triple: x86_64-apple-darwin
            runner: macos-15
          - triple: aarch64-apple-darwin
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Check tag matches the workspace version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match workspace version $version" >&2
            exit 1
          fi

      - name: Install musl toolchain
        if: contains(matrix.triple, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust target
        run: |
          rustup update --no-self-update stable
          rustup target add ${{ matrix.triple }}

      - name: Install giant
        run: |
          curl -fsSL https://giant.build/install.sh | GIANT_INSTALL_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Expose the cache credentials to giant
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build through giant
        env:
          RUST_LOG: giant=info
        run: giant build --tag platform=${{ matrix.triple }}

      - name: Package
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          tarball="giant-${version}-${{ matrix.triple }}.tar.gz"
          cp LICENSE NOTICE "output/release/${{ matrix.triple }}/"
          (cd "output/release/${{ matrix.triple }}" && tar -czf "../../../$tarball" -- *)

      - uses: actions/upload-artifact@v7
        with:
          name: tarball-${{ matrix.triple }}
          path: giant-*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum giant-*.tar.gz > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --title "$GITHUB_REF_NAME"
          --generate-notes
          --verify-tag
          giant-*.tar.gz SHA256SUMS
