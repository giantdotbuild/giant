name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # The plain clippy pass fully type-checks the no-feature configuration
      # (--all-targets includes tests), so the test suite runs once, with
      # features - that pass is a superset of the plain one apart from the
      # tiny cfg(not(remote)) stubs.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --workspace --all-targets --features giant/remote -- -D warnings
      # Link the bins before testing: the smoke tests spawn `giant build`,
      # which dispatches to the giant-build binary beside the giant binary,
      # and those siblings must carry the same features as the tests.
      - run: cargo build --workspace --locked --features giant/remote
      - run: cargo test --workspace --locked --features giant/remote

  # The dogfood chain: the dev environment from devenv (via Determinate
  # Nix), the previous giant release building the next one, results shared
  # through the github_actions remote cache. An unchanged target on a
  # later run is a REMOTE hit that skips cargo/npm entirely.
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-substituters = https://devenv.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=
      - run: nix profile add nixpkgs#devenv
      - name: Expose the cache credentials to giant
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Install the released giant
        run: |
          curl -fsSL https://giant.build/install.sh | GIANT_INSTALL_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build the workspace with giant
        env:
          # Surface remote-cache activity (default is errors only) - uploads
          # are best-effort and otherwise invisible.
          RUST_LOG: giant=info
        # --no-tag release: the per-platform release targets need cross
        # toolchains this job doesn't carry; the release workflow builds them.
        run: devenv shell bash -- -c 'giant build --quiet --no-tag release'
      - name: Cache-key stability probe
        run: |
          # Prints the key sections for a leaf and a dependent target;
          # comparing across runs shows which section drifts when CI
          # misses the cache.
          devenv shell bash -- -c 'giant explain //:devenv && giant explain //crates/giant-clean:giant-clean'

  # The github_actions remote backend against the real cache service - the
  # signed-URL flow can't be fully faked, so prove it where it runs.
  gha-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - name: Expose the runner's cache credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - run: cargo build --locked -p giant -p giant-build --features giant/remote
      - name: Round-trip against the real cache service
        env:
          # Name upload/lookup failures - they're best-effort and silent
          # otherwise, and this job exists to catch them.
          RUST_LOG: giant=info
        run: |
          ws="$(mktemp -d)"
          printf 'run %s\n' "$GITHUB_RUN_ID" > "$ws/in.txt"
          printf '%s\n' \
            'workspace: { name: gha_roundtrip }' \
            'cache: { dir: ./cache }' \
            'remote: { enabled: true, kind: github_actions }' \
            'targets:' \
            '  - name: demo' \
            '    inputs: ["in.txt"]' \
            '    outputs: ["out.txt"]' \
            '    command: "cp in.txt out.txt"' \
            > "$ws/giant.yaml"
          export PATH="$PWD/target/debug:$PATH"
          (cd "$ws" && giant build)
          # A freshly finalized entry can lag readers, and concurrent
          # workflows (a release uploading four platforms) can rate-limit
          # the service for a stretch. Each attempt rebuilds, which also
          # re-tries the upload; poll wide enough to ride out a storm.
          for i in 1 2 3 4 5 6 7 8; do
            rm -rf "$ws/cache" "$ws/out.txt"
            (cd "$ws" && giant build) | tee second.log
            grep -q REMOTE second.log && break
            [ "$i" = 8 ] && { echo "no REMOTE hit after $i attempts"; exit 1; }
            sleep 10
          done
          grep -q 'run' "$ws/out.txt"
