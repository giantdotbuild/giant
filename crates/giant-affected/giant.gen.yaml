targets:
- name: giant-affected
  inputs:
  - src/**/*.rs
  - Cargo.toml
  - //Cargo.toml
  - //Cargo.lock
  outputs:
  - //bin/giant-affected
  deps:
  - //:devenv
  command: cargo build --release -p giant-affected --bin giant-affected && install -m 0755 target/release/giant-affected $GIANT_WORKSPACE_ROOT/bin/giant-affected
  cwd: //
  timeout_secs: 600
  tags:
  - bin
  - rust
