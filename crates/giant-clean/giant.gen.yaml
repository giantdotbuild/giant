targets:
- name: giant-clean
  inputs:
  - src/**/*.rs
  - Cargo.toml
  - //Cargo.toml
  - //Cargo.lock
  outputs:
  - //bin/giant-clean
  deps:
  - //:devenv
  command: cargo build --release -p giant-clean --bin giant-clean && install -m 0755 target/release/giant-clean $GIANT_WORKSPACE_ROOT/bin/giant-clean
  cwd: //
  timeout_secs: 600
  tags:
  - bin
  - rust
