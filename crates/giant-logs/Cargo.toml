[package]
name = "giant-logs"
version = "0.1.0"
edition = "2024"

[dependencies]
# Reads a target's AC entry + its stdout/stderr CAS blobs (ADR-0034). Links the
# giant lib for the workspace load, cache-key compute, and cache reads.
giant = { path = "../giant" }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
tempfile = "3"
