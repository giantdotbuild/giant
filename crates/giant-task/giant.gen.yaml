targets:
- name: giant-task
  inputs:
  - src/**/*.rs
  - Cargo.toml
  - //Cargo.toml
  - //Cargo.lock
  outputs:
  - //bin/giant-task
  deps:
  - //:devenv
  command: cargo build --release -p giant-task --bin giant-task && install -m 0755 target/release/giant-task bin/giant-task
  cwd: //
  timeout_secs: 600
  tags:
  - bin
  - rust
